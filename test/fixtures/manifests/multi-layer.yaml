version: "1.0"
name: test-multi-layer
description: Test image with multiple layers for order verification

kernel:
  path: ../../debug-kernel/vmlinux-6.1.155
  cmdline: "console=ttyS0 reboot=k panic=1"

layers:
  - name: base
    type: base
    source: file://../layers/base-layer.tar.gz
    required: true

  - name: layer1
    type: feature
    source: file://../layers/layer1.tar.gz
    dependencies:
      - base

  - name: layer2
    type: feature
    source: file://../layers/layer2.tar.gz
    dependencies:
      - layer1

  - name: layer3
    type: application
    source: file://../layers/layer3.tar.gz
    dependencies:
      - layer2

output:
  format: ext4
  size_mb: 256
  compression: none
